# TikTok/Reels MVP — docker-compose
# Slug: tiktok-reels
#
# Full stack: FastAPI app + PostgreSQL 16 + Redis 7.
# Per MVP design decisions:
#   D1: Postgres is the authoritative store for videos, users, comments, engagement.
#   D2: Redis caches the trending feed (sorted sets) and denormalized counters.
#   D3: No external media server — segments stored as metadata + mock file paths.
#
# Start:   docker compose up --build -d
# Stop:    docker compose down
# Logs:    docker compose logs -f
#
# All services have Docker HEALTHCHECKs; compose waits for db + redis to
# be healthy before starting app. The app port is configurable via APP_PORT.

services:
  db:
    image: postgres:16-alpine
    container_name: tiktok-reels-db
    environment:
      POSTGRES_USER: tiktok
      POSTGRES_PASSWORD: tiktok
      POSTGRES_DB: tiktok_reels
    # Postgres is NOT published to the host by default — the app talks
    # over the compose network. Uncomment only if you need to connect
    # from a host tool (psql, pgAdmin, etc.):
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tiktok-reels-net

  redis:
    image: redis:7-alpine
    container_name: tiktok-reels-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - tiktok-reels-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiktok-reels-app
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://tiktok:tiktok@db:5432/tiktok_reels"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "${APP_PORT:-8010}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - tiktok-reels-net

networks:
  tiktok-reels-net:
    driver: bridge

volumes:
  pgdata:
