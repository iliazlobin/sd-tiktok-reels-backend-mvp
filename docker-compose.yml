services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tiktok
      POSTGRES_PASSWORD: tiktok
      POSTGRES_DB: tiktok_reels
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      # Override the host port via APP_PORT env var to avoid collisions.
      # Default 8010 — safe default that won't collide with common services.
      - "${APP_PORT:-8010}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://tiktok:tiktok@db:5432/tiktok_reels
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # python:3.12-slim has no curl; use urllib (matches the app image toolset).
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
